<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="nemuran.me - 空气喵的小站">
    <meta name="theme-color" content="#333">
    <link rel="preload" href="background.webp" as="image">
    <link rel="icon" type="image/png" sizes="32x32" href="src/imgs/favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="src/imgs/favicon_io/favicon-16x16.png">
    <link rel="shortcut icon" href="src/imgs/favicon_io/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="src/imgs/favicon_io/apple-touch-icon.png">
    <link rel="manifest" href="src/imgs/favicon_io/site.webmanifest">
    <title>nemuran.me</title>
    <link rel="stylesheet" href="src/dock tool/dock.css">
    <link rel="stylesheet" href="src/music card/music.css">
    <link rel="stylesheet" href="src/setting/setting.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        @keyframes fadeInUpBlur {
            0% { opacity: 0; transform: translateY(40px); filter: blur(10px); }
            100% { opacity: 1; transform: translateY(0); filter: blur(0); }
        }
        @keyframes fadeInText {
            0% { opacity: 0; transform: translateY(12px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes float {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        @keyframes subtleShine {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        body {
            min-height: 100vh;
            background: #000;
            background: url("background.webp") center/cover no-repeat fixed;
            color: #fff;
            position: relative;
            overflow: hidden;
            perspective: 1500px;
        }
        body::before {
            content: ""; position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(0,0,0,0.25) 0%, rgba(0,0,0,0.05) 100%);
            z-index: 0;
        }
        body::after {
            content: ""; position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
            background-size: 45px 45px;
            z-index: 0; animation: float 25s linear infinite;
        }

        .container {
            position: absolute; top: 2.5rem; left: 2.5rem;
            z-index: 1; display: flex; flex-direction: column; gap: 1.2rem;
        }
        .glass-card {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.25), 0 0 0 1px rgba(255,255,255,0.1), inset 0 1px 0 rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.5s cubic-bezier(0.4,0,0.2,1);
            position: relative; overflow: hidden;
            animation: fadeInUpBlur 1.4s cubic-bezier(0.22,1,0.36,1) both;
        }
        .glass-card::before {
            content: ''; position: absolute; top:0; left:0; width:100%; height:100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            z-index:0; animation: subtleShine 8s infinite linear;
        }
        .glass-card:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-6px);
            box-shadow: 0 16px 48px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.18);
        }

        .time-card {
            padding: 2.4rem 2.2rem; text-align: center; max-width: 380px;
            animation-delay: 0.2s;
        }
        .site-intro {
            padding: 1.8rem 2rem; max-width: 380px;
            animation-delay: 0.4s;
        }
        .site-intro h3 {
            font-size: 1.3rem; margin-bottom: 1rem; color: rgba(255,255,255,0.95);
            font-weight: 500; letter-spacing: 0.5px;
            animation: fadeInText 1.5s ease-out 0.5s both;
            position: relative; z-index:1;
        }
        .site-intro p {
            font-size: 0.95rem; line-height: 1.6; color: rgba(255,255,255,0.85);
            font-weight: 300; letter-spacing: 0.5px;
            animation: fadeInText 1.5s ease-out 0.6s both;
            position: relative; z-index:1;
        }
        .date-info {
            font-size: 1rem; margin-bottom: 1rem; opacity: 0.9;
            color: rgba(255,255,255,0.85); font-weight: 300; letter-spacing: 1px;
            animation: fadeInText 1.5s ease-out 0.4s both;
            position: relative; z-index:1;
        }
        .clock-display {
            font-size: 3.4rem; font-weight: 300; letter-spacing: 8px; margin:1rem 0;
            font-variant-numeric: tabular-nums; color: rgba(255,255,255,1);
            text-shadow: 0 0 20px rgba(255,255,255,0.25), 0 4px 12px rgba(0,0,0,0.3);
            min-width: 280px; display: inline-block; text-align: center; line-height:1;
            transition: all 0.4s ease;
            animation: fadeInText 1.5s ease-out 0.5s both;
            position: relative; z-index:1;
        }
        .time-card:hover .clock-display {
            text-shadow: 0 0 30px rgba(255,255,255,0.4), 0 6px 20px rgba(0,0,0,0.4);
            transform: scale(1.03);
        }

        @media (max-width:768px){
            .container{top:1.5rem; left:1.5rem; gap:1rem;}
            .time-card{padding:2rem 1.8rem; max-width:320px; border-radius:20px;}
            .site-intro{padding:1.2rem 1.5rem; max-width:320px; border-radius:20px;}
            .clock-display{font-size:2.8rem; letter-spacing:5px; min-width:230px;}
            .settings-btn{top:1rem; right:1rem;}
        }
        @media (max-width:480px){
            .container{top:1rem; left:1rem; right:1rem; gap:0.8rem;}
            .time-card,.site-intro{padding:1.2rem; max-width:100%;}
            .clock-display{font-size:2.2rem; letter-spacing:4px; min-width:180px;}
            .settings-btn{top:0.8rem; right:0.8rem; width:38px; height:38px; font-size:1rem;}
        }
    </style>
</head>
<body>

<button class="settings-btn" id="settingsBtn">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94a7.07 7.07 0 0 0 .06-.94c0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96a6.94 6.94 0 0 0-1.63-.94l-.36-2.54a.48.48 0 0 0-.48-.41h-3.84a.48.48 0 0 0-.48.41l-.36 2.54c-.59.24-1.13.57-1.63.94l-2.39-.96a.49.49 0 0 0-.59.22L2.74 8.87a.48.48 0 0 0 .12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.37 1.04.7 1.63.94l.36 2.54c.05.24.26.41.48.41h3.84c.24 0 .44-.17.48-.41l.36-2.54c.59-.24 1.13-.57 1.63-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32a.49.49 0 0 0-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1 1 12 8.4a3.6 3.6 0 0 1 0 7.2z"/></svg>
</button>

<div class="settings-panel-overlay" id="settingsOverlay">
    <div class="settings-panel">
        <div class="settings-panel-header">
            <h3>页面设置</h3>
            <button class="settings-close" id="settingsClose">&times;</button>
        </div>

        <div class="settings-section">
            <div class="settings-section-title">站点信息</div>
            <div class="settings-item settings-item-col">
                <div class="settings-item-label">你的昵称</div>
                <input class="settings-input" id="settingNickname" placeholder="请输入你的昵称" maxlength="20">
            </div>
            <div class="settings-item settings-item-col">
                <div class="settings-item-label">站点标题</div>
                <input class="settings-input" id="settingSiteTitle" placeholder="nemuran.me" maxlength="20">
            </div>
        </div>

        <div class="settings-section">
            <div class="settings-section-title">显示</div>
            <div class="settings-item">
                <div>
                    <div class="settings-item-label">毛玻璃效果</div>
                    <div class="settings-item-desc">控制卡片背景模糊</div>
                </div>
                <button class="settings-toggle active" id="toggleGlass"></button>
            </div>
            <div class="settings-item">
                <div>
                    <div class="settings-item-label">显示底栏</div>
                    <div class="settings-item-desc">底部工具栏</div>
                </div>
                <button class="settings-toggle active" id="toggleDock"></button>
            </div>
        </div>

        <div class="settings-section">
            <div class="settings-section-title">壁纸</div>
            <div class="wallpaper-grid" id="wallpaperGrid">
                <div class="wallpaper-item active" data-src="default">
                    <img src="background.webp" alt="默认">
                    <span class="wallpaper-check">✓</span>
                </div>
            </div>
            <input type="file" id="wallpaperUploadInput" accept="image/*" multiple style="display:none;">
        </div>

        <div class="settings-section">
            <button class="settings-advanced-btn" id="goAdvanced">
                高级设置
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
        </div>

        <div class="settings-section">
            <button class="settings-btn-action settings-btn-primary" id="settingsSave">保存设置</button>
        </div>

        <div class="settings-version"><a href="https://github.com/Nh12356-git/nemuran.me" target="_blank" style="color:rgba(255,255,255,0.2);text-decoration:none;transition:color 0.3s;" onmouseover="this.style.color='rgba(255,255,255,0.4)'" onmouseout="this.style.color='rgba(255,255,255,0.2)'">nemuran.me v1.0 · GitHub</a></div>
    </div>
</div>

<div class="advanced-modal-overlay" id="advancedOverlay">
    <div class="advanced-modal">
        <div class="settings-panel-header">
            <h3>高级设置</h3>
            <button class="settings-close" id="advancedClose">&times;</button>
        </div>

        <div class="settings-section">
            <div class="settings-section-title">播放源链接</div>
            <div class="settings-item settings-item-col">
                <div class="settings-item-desc">点击歌曲跳转的平台地址</div>
                <div class="platform-inputs">
                    <div class="platform-input-row">
                        <span class="platform-label">网易云</span>
                        <input class="settings-input" id="settingNetease" placeholder="https://music.163.com/...">
                    </div>
                    <div class="platform-input-row">
                        <span class="platform-label">QQ音乐</span>
                        <input class="settings-input" id="settingQQ" placeholder="https://y.qq.com/...">
                    </div>
                    <div class="platform-input-row">
                        <span class="platform-label">Bilibili</span>
                        <input class="settings-input" id="settingBilibili" placeholder="https://www.bilibili.com/...">
                    </div>
                </div>
            </div>
        </div>

        <div class="settings-section">
            <div class="settings-section-title">数据管理</div>
            <div class="data-btn-row">
                <button class="settings-btn-action" id="settingsExport">导出配置</button>
                <button class="settings-btn-action" id="settingsImport">导入配置</button>
            </div>
            <input type="file" id="importFileInput" accept=".json" style="display:none;">
            <button class="settings-btn-action settings-btn-danger" id="settingsReset">重置所有设置</button>
        </div>
    </div>
</div>

<main class="container">
    <div class="glass-card time-card">
        <div class="date-info" id="date"></div>
        <div class="clock-display" id="clock"></div>
    </div>
    <div class="glass-card site-intro">
        <h3>关于本站</h3>
        <p>由 空气喵 创建的网站</p>
    </div>
    <div class="glass-card music-card">
        <div class="music-top">
            <div class="music-cover">
                <img id="coverImg" alt="封面">
            </div>
            <div class="music-meta">
                <div class="music-title" id="musicTitle">未播放</div>
                <div class="music-artist" id="musicArtist">-</div>
            </div>
        </div>
        <div class="lyric-container" id="lyricContainer">
            <div class="lyric-inner" id="lyricInner">
                <div class="lyric-placeholder">暂无歌词</div>
            </div>
        </div>
        <div class="music-progress">
            <span class="time" id="currentTime">00:00</span>
            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <span class="time" id="duration">00:00</span>
        </div>
        <div class="music-controls">
            <div class="music-controls-left">
                <button class="ctrl-btn" id="prevBtn"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg></button>
                <button class="play-btn" id="playBtn"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></button>
                <button class="ctrl-btn" id="nextBtn"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18 14.5 12 6 6zM16 6h2v12h-2z"/></svg></button>
            </div>
            <div class="music-controls-right">
                <button class="ctrl-btn playlist-btn" id="playlistBtn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg></button>
            </div>
        </div>
        <audio id="audio" preload="auto">
            <source src="file/music/music.mp3" type="audio/mpeg">
        </audio>
    </div>
</main>

<div class="playlist-overlay" id="playlistOverlay">
    <div class="playlist-panel">
        <div class="playlist-header">
            <h3>歌单</h3>
            <button class="playlist-close" id="playlistClose">&times;</button>
        </div>
        <div class="playlist-list" id="playlistList"></div>
    </div>
</div>

<div class="bottom-dock" id="bottomDock">
    <div class="dock-add" id="dockAddBtn">
        <span class="dock-icon">+</span>
        <span class="dock-label">添加</span>
    </div>
</div>

<div class="dock-modal-overlay" id="dockModal">
    <div class="dock-modal">
        <h3>添加工具</h3>
        <div class="dock-modal-field">
            <label>工具名称</label>
            <input type="text" id="toolName" placeholder="例如：DeepSeek" maxlength="8">
        </div>
        <div class="dock-modal-field">
            <label>网址</label>
            <input type="url" id="toolUrl" placeholder="https://example.com">
        </div>
        <div class="dock-modal-field">
            <label>图标网址 <span style="opacity:0.5;font-size:0.65rem">（留空自动获取网站图标）</span></label>
            <input type="url" id="toolIconUrl" placeholder="留空则自动获取">
        </div>
        <div class="dock-modal-btns">
            <button class="dock-modal-cancel" id="dockCancel">取消</button>
            <button class="dock-modal-confirm" id="dockConfirm">添加</button>
        </div>
    </div>
</div>

    <script src="src/js/jsmediatags.min.js"></script>
    <script src="src/dock tool/dock.js"></script>
    <script src="src/music card/music.js"></script>
    <script src="src/setting/setting.js"></script>
    <script>
    const clock = document.getElementById('clock');
    const dateElement = document.getElementById('date');
    let lastDate = '', lastTime = '';
    function updateDateTime() {
        const now = new Date();
        const y = now.getFullYear();
        const m = String(now.getMonth()+1).padStart(2,'0');
        const d = String(now.getDate()).padStart(2,'0');
        const w = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'][now.getDay()];
        const dateStr = `${y} 年 ${m} 月 ${d} 日 ${w}`;
        if(dateStr!==lastDate){dateElement.textContent=dateStr; lastDate=dateStr;}
        const hh = String(now.getHours()).padStart(2,'0');
        const mm = String(now.getMinutes()).padStart(2,'0');
        const ss = String(now.getSeconds()).padStart(2,'0');
        const timeStr = `${hh}:${mm}:${ss}`;
        if(timeStr!==lastTime){clock.textContent=timeStr; lastTime=timeStr;}
        requestAnimationFrame(updateDateTime);
    }
    updateDateTime();

    // Init Music Player
    MusicPlayer.init();

    // Init Dock
    DockManager.init();

    // Init Settings
    initSettings();
</script>

</body>
</html>
