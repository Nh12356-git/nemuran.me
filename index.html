<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="nemuran.me - 空气喵的小站">
    <meta name="theme-color" content="#333">
    <link rel="preload" href="background.webp" as="image">
    <link rel="icon" href="imgs/favicon_io/favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="imgs/favicon_io/favicon.ico" type="image/x-icon">
    <title>nemuran.me</title>
    <link rel="stylesheet" href="file/dock tool/dock.css">
    <link rel="stylesheet" href="file/aplayer/APlayer.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        @keyframes fadeInUpBlur {
            0% { opacity: 0; transform: translateY(40px); filter: blur(10px); }
            100% { opacity: 1; transform: translateY(0); filter: blur(0); }
        }
        @keyframes fadeInText {
            0% { opacity: 0; transform: translateY(12px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes float {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        @keyframes subtleShine {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        body {
            min-height: 100vh;
            background: #000;
            background: url("background.webp") center/cover no-repeat fixed;
            color: #fff;
            position: relative;
            overflow: hidden;
            perspective: 1500px;
        }
        body::before {
            content: ""; position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(0,0,0,0.25) 0%, rgba(0,0,0,0.05) 100%);
            z-index: 0;
        }
        body::after {
            content: ""; position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
            background-size: 45px 45px;
            z-index: 0; animation: float 25s linear infinite;
        }

        .container {
            position: absolute; top: 2.5rem; left: 2.5rem;
            z-index: 1; display: flex; flex-direction: column; gap: 1.2rem;
        }
        .glass-card {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.25), 0 0 0 1px rgba(255,255,255,0.1), inset 0 1px 0 rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.5s cubic-bezier(0.4,0,0.2,1);
            position: relative; overflow: hidden;
            animation: fadeInUpBlur 1.4s cubic-bezier(0.22,1,0.36,1) both;
        }
        .glass-card::before {
            content: ''; position: absolute; top:0; left:0; width:100%; height:100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            z-index:0; animation: subtleShine 8s infinite linear;
        }
        .glass-card:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-6px);
            box-shadow: 0 16px 48px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.18);
        }

        .time-card {
            padding: 2.4rem 2.2rem; text-align: center; max-width: 380px;
            animation-delay: 0.2s;
        }
        .site-intro {
            padding: 1.8rem 2rem; max-width: 380px;
            animation-delay: 0.4s;
        }
        .site-intro h3 {
            font-size: 1.3rem; margin-bottom: 1rem; color: rgba(255,255,255,0.95);
            font-weight: 500; letter-spacing: 0.5px;
            animation: fadeInText 1.5s ease-out 0.5s both;
            position: relative; z-index:1;
        }
        .site-intro p {
            font-size: 0.95rem; line-height: 1.6; color: rgba(255,255,255,0.85);
            font-weight: 300; letter-spacing: 0.5px;
            animation: fadeInText 1.5s ease-out 0.6s both;
            position: relative; z-index:1;
        }
        .date-info {
            font-size: 1rem; margin-bottom: 1rem; opacity: 0.9;
            color: rgba(255,255,255,0.85); font-weight: 300; letter-spacing: 1px;
            animation: fadeInText 1.5s ease-out 0.4s both;
            position: relative; z-index:1;
        }
        .clock-display {
            font-size: 3.4rem; font-weight: 300; letter-spacing: 8px; margin:1rem 0;
            font-variant-numeric: tabular-nums; color: rgba(255,255,255,1);
            text-shadow: 0 0 20px rgba(255,255,255,0.25), 0 4px 12px rgba(0,0,0,0.3);
            min-width: 280px; display: inline-block; text-align: center; line-height:1;
            transition: all 0.4s ease;
            animation: fadeInText 1.5s ease-out 0.5s both;
            position: relative; z-index:1;
        }
        .time-card:hover .clock-display {
            text-shadow: 0 0 30px rgba(255,255,255,0.4), 0 6px 20px rgba(0,0,0,0.4);
            transform: scale(1.03);
        }

        .music-card {
            padding: 0; max-width: 400px;
            animation-delay: 0.6s;
            position: relative; z-index:1;
            overflow: visible;
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;
        }
        #aplayer .aplayer {
            background: rgba(255,255,255,0.08) !important;
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 16px !important;
            box-shadow: 0 8px 32px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.1);
            margin: 0 !important;
            overflow: hidden;
        }
        #aplayer .aplayer-info {
            background: transparent !important;
        }
        #aplayer .aplayer .aplayer-music {
            color: rgba(255,255,255,0.95) !important;
        }
        #aplayer .aplayer .aplayer-music .aplayer-author {
            color: rgba(255,255,255,0.6) !important;
        }
        #aplayer .aplayer .aplayer-time {
            color: rgba(255,255,255,0.6) !important;
        }
        #aplayer .aplayer .aplayer-bar {
            background: rgba(255,255,255,0.2) !important;
        }
        #aplayer .aplayer .aplayer-loaded {
            background: rgba(255,255,255,0.3) !important;
        }
        #aplayer .aplayer .aplayer-played {
            background: rgba(138,180,248,0.7) !important;
        }
        #aplayer .aplayer .aplayer-thumb {
            background: rgba(138,180,248,0.9) !important;
        }
        #aplayer .aplayer .aplayer-icon path {
            fill: rgba(255,255,255,0.8) !important;
        }
        #aplayer .aplayer .aplayer-icon:hover path {
            fill: rgba(255,255,255,1) !important;
        }
        #aplayer .aplayer .aplayer-volume-bar {
            background: rgba(255,255,255,0.2) !important;
        }
        #aplayer .aplayer .aplayer-volume {
            background: rgba(255,255,255,0.7) !important;
        }
        #aplayer .aplayer .aplayer-list ol li {
            color: rgba(255,255,255,0.8) !important;
            border-top-color: rgba(255,255,255,0.08) !important;
        }
        #aplayer .aplayer .aplayer-list ol li:hover {
            background: rgba(255,255,255,0.08) !important;
        }
        #aplayer .aplayer .aplayer-list ol li.aplayer-list-light {
            background: rgba(138,180,248,0.2) !important;
        }
        #aplayer .aplayer .aplayer-list ol li.aplayer-list-light .aplayer-list-cur {
            background: rgba(138,180,248,0.8) !important;
        }

        .settings-btn {
            position: fixed; top: 1.5rem; right: 1.5rem; z-index: 90;
            width: 42px; height: 42px; border-radius: 50%; border: none;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.12);
            color: rgba(255,255,255,0.6); font-size: 1.1rem;
            cursor: pointer; transition: all 0.3s;
            display: flex; align-items: center; justify-content: center;
            animation: fadeInUpBlur 1.4s cubic-bezier(0.22,1,0.36,1) 0.8s both;
        }
        .settings-btn:hover {
            background: rgba(255,255,255,0.15); color: #fff;
            transform: rotate(60deg) scale(1.05);
        }

        .settings-panel-overlay {
            position: fixed; inset: 0; z-index: 200;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
            display: flex; align-items: flex-start; justify-content: flex-end;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s;
        }
        .settings-panel-overlay.active { opacity: 1; pointer-events: auto; }
        .settings-panel {
            position: absolute; top: 0; right: 0;
            width: 320px; max-width: 85vw; height: 100vh;
            background: rgba(20,20,35,0.92);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border-left: 1px solid rgba(255,255,255,0.1);
            padding: 2rem 1.5rem;
            transform: translateX(100%);
            transition: transform 0.35s cubic-bezier(0.22,1,0.36,1);
            overflow-y: auto;
        }
        .settings-panel-overlay.active .settings-panel { transform: translateX(0); }
        .settings-panel-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 1.5rem; padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .settings-panel-header h3 {
            font-size: 1.1rem; font-weight: 500; color: rgba(255,255,255,0.95);
        }
        .settings-close {
            width: 32px; height: 32px; border-radius: 8px; border: none;
            background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.5);
            cursor: pointer; font-size: 1rem; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .settings-close:hover { background: rgba(255,255,255,0.12); color: #fff; }
        .settings-section {
            margin-bottom: 1.5rem;
        }
        .settings-section-title {
            font-size: 0.7rem; color: rgba(255,255,255,0.35);
            letter-spacing: 1px; text-transform: uppercase;
            margin-bottom: 0.8rem;
        }
        .settings-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0.7rem 0.8rem; border-radius: 10px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            margin-bottom: 0.5rem; transition: background 0.2s;
        }
        .settings-item:hover { background: rgba(255,255,255,0.08); }
        .settings-item-label {
            font-size: 0.85rem; color: rgba(255,255,255,0.85);
        }
        .settings-item-desc {
            font-size: 0.7rem; color: rgba(255,255,255,0.4);
            margin-top: 0.15rem;
        }
        .settings-input {
            width: 100%; padding: 0.5rem 0.7rem; border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.06); color: #fff;
            font-size: 0.8rem; outline: none; transition: border-color 0.3s;
            margin-top: 0.4rem;
        }
        .settings-input:focus { border-color: rgba(138,180,248,0.6); }
        .settings-input::placeholder { color: rgba(255,255,255,0.25); }
        .settings-toggle {
            width: 40px; height: 22px; border-radius: 11px; border: none;
            background: rgba(255,255,255,0.15); cursor: pointer;
            position: relative; transition: background 0.3s; flex-shrink: 0;
        }
        .settings-toggle.active { background: rgba(138,180,248,0.6); }
        .settings-toggle::after {
            content: ''; position: absolute; top: 3px; left: 3px;
            width: 16px; height: 16px; border-radius: 50%;
            background: #fff; transition: transform 0.3s;
        }
        .settings-toggle.active::after { transform: translateX(18px); }
        .settings-btn-action {
            width: 100%; padding: 0.6rem; border-radius: 10px; border: none;
            font-size: 0.8rem; cursor: pointer; transition: all 0.3s;
            background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.7);
            border: 1px solid rgba(255,255,255,0.08);
            margin-top: 0.4rem;
        }
        .settings-btn-action:hover { background: rgba(255,255,255,0.12); color: #fff; }
        .settings-btn-danger {
            background: rgba(255,80,80,0.12); color: rgba(255,120,120,0.9);
            border-color: rgba(255,80,80,0.15);
        }
        .settings-btn-danger:hover { background: rgba(255,80,80,0.2); color: #ff7777; }
        .settings-version {
            text-align: center; font-size: 0.65rem; color: rgba(255,255,255,0.2);
            margin-top: 1.5rem; padding-top: 1rem;
            border-top: 1px solid rgba(255,255,255,0.06);
        }

        .advanced-modal-overlay {
            position: fixed; inset: 0; z-index: 250;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s;
        }
        .advanced-modal-overlay.active { opacity: 1; pointer-events: auto; }
        .advanced-modal {
            background: rgba(20,20,35,0.92);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; padding: 1.5rem;
            width: 90%; max-width: 360px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            transform: translateY(20px) scale(0.95);
            transition: transform 0.3s cubic-bezier(0.22,1,0.36,1);
        }
        .advanced-modal-overlay.active .advanced-modal { transform: translateY(0) scale(1); }

        @media (max-width:768px){
            .container{top:1.5rem; left:1.5rem; gap:1rem;}
            .time-card{padding:2rem 1.8rem; max-width:320px; border-radius:20px;}
            .site-intro,.music-card{padding:1.2rem 1.5rem; max-width:320px; border-radius:20px;}
            .clock-display{font-size:2.8rem; letter-spacing:5px; min-width:230px;}
            .music-cover{width:56px; height:56px;}
            .settings-btn{top:1rem; right:1rem;}
        }
        @media (max-width:480px){
            .container{top:1rem; left:1rem; right:1rem; gap:0.8rem;}
            .time-card,.site-intro,.music-card{padding:1.2rem; max-width:100%;}
            .clock-display{font-size:2.2rem; letter-spacing:4px; min-width:180px;}
            .settings-btn{top:0.8rem; right:0.8rem; width:38px; height:38px; font-size:1rem;}
        }
    </style>
</head>
<body>

<button class="settings-btn" id="settingsBtn">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94a7.07 7.07 0 0 0 .06-.94c0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96a6.94 6.94 0 0 0-1.63-.94l-.36-2.54a.48.48 0 0 0-.48-.41h-3.84a.48.48 0 0 0-.48.41l-.36 2.54c-.59.24-1.13.57-1.63.94l-2.39-.96a.49.49 0 0 0-.59.22L2.74 8.87a.48.48 0 0 0 .12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.37 1.04.7 1.63.94l.36 2.54c.05.24.26.41.48.41h3.84c.24 0 .44-.17.48-.41l.36-2.54c.59-.24 1.13-.57 1.63-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32a.49.49 0 0 0-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1 1 12 8.4a3.6 3.6 0 0 1 0 7.2z"/></svg>
</button>

<div class="settings-panel-overlay" id="settingsOverlay">
    <div class="settings-panel">
        <div class="settings-panel-header">
            <h3>页面设置</h3>
            <button class="settings-close" id="settingsClose">&times;</button>
        </div>

        <div class="settings-section">
            <div class="settings-section-title">站点信息</div>
            <div class="settings-item" style="flex-direction:column;align-items:stretch;">
                <div class="settings-item-label">你的昵称 <span style="color:rgba(255,120,120,0.8);font-size:0.7rem;">*必填</span></div>
                <input class="settings-input" id="settingNickname" placeholder="请输入你的昵称" maxlength="20">
            </div>
            <div class="settings-item" style="flex-direction:column;align-items:stretch;">
                <div class="settings-item-label">站点标题</div>
                <input class="settings-input" id="settingSiteTitle" placeholder="nemuran.me" maxlength="20">
            </div>
        </div>

        <div class="settings-section">
            <div class="settings-section-title">显示</div>
            <div class="settings-item">
                <div>
                    <div class="settings-item-label">毛玻璃效果</div>
                    <div class="settings-item-desc">控制卡片背景模糊</div>
                </div>
                <button class="settings-toggle active" id="toggleGlass"></button>
            </div>
            <div class="settings-item">
                <div>
                    <div class="settings-item-label">显示底栏</div>
                    <div class="settings-item-desc">底部工具栏</div>
                </div>
                <button class="settings-toggle active" id="toggleDock"></button>
            </div>
        </div>

        <div class="settings-section">
            <div class="settings-item" style="justify-content:center;cursor:pointer;background:rgba(255,255,255,0.04);" id="goAdvanced">
                <div class="settings-item-label">高级设置</div>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.5;"><polyline points="9 18 15 12 9 6"/></svg>
            </div>
        </div>

        <button class="settings-btn-action" id="settingsSave" style="margin-bottom:0.5rem;">保存设置</button>

        <div class="settings-version"><a href="https://github.com/Nh12356-git/nemuran.me" target="_blank" style="color:rgba(255,255,255,0.25);text-decoration:none;transition:color 0.3s;" onmouseover="this.style.color='rgba(255,255,255,0.5)'" onmouseout="this.style.color='rgba(255,255,255,0.25)'">nemuran.me v1.0 · GitHub</a></div>
    </div>
</div>

<div class="advanced-modal-overlay" id="advancedOverlay">
    <div class="advanced-modal">
        <div class="settings-panel-header">
            <h3>高级设置</h3>
            <button class="settings-close" id="advancedClose">&times;</button>
        </div>

        <div class="settings-section">
            <div class="settings-section-title">播放源链接</div>
            <div class="settings-item" style="flex-direction:column;align-items:stretch;">
                <div class="settings-item-desc">点击歌曲跳转的平台地址</div>
                <div style="display:flex;flex-direction:column;gap:0.4rem;margin-top:0.4rem;">
                    <div style="display:flex;align-items:center;gap:0.5rem;">
                        <span style="font-size:0.75rem;color:rgba(255,255,255,0.5);min-width:52px;">网易云</span>
                        <input class="settings-input" id="settingNetease" placeholder="https://music.163.com/..." style="margin:0;">
                    </div>
                    <div style="display:flex;align-items:center;gap:0.5rem;">
                        <span style="font-size:0.75rem;color:rgba(255,255,255,0.5);min-width:52px;">QQ音乐</span>
                        <input class="settings-input" id="settingQQ" placeholder="https://y.qq.com/..." style="margin:0;">
                    </div>
                    <div style="display:flex;align-items:center;gap:0.5rem;">
                        <span style="font-size:0.75rem;color:rgba(255,255,255,0.5);min-width:52px;">Bilibili</span>
                        <input class="settings-input" id="settingBilibili" placeholder="https://www.bilibili.com/..." style="margin:0;">
                    </div>
                </div>
            </div>
        </div>

        <div class="settings-section">
            <div class="settings-section-title">数据管理</div>
            <div style="display:flex;gap:0.5rem;">
                <button class="settings-btn-action" id="settingsExport" style="flex:1;">导出配置</button>
                <button class="settings-btn-action" id="settingsImport" style="flex:1;">导入配置</button>
            </div>
            <input type="file" id="importFileInput" accept=".json" style="display:none;">
            <button class="settings-btn-action settings-btn-danger" id="settingsReset" style="margin-top:0.5rem;">重置所有设置</button>
        </div>
    </div>
</div>

<main class="container">
    <div class="glass-card time-card">
        <div class="date-info" id="date"></div>
        <div class="clock-display" id="clock"></div>
    </div>
    <div class="glass-card site-intro">
        <h3>关于本站</h3>
        <p>由 空气喵 创建的网站</p>
    </div>
    <div class="glass-card music-card" style="padding:0;background:transparent;border:none;box-shadow:none;">
        <div id="aplayer"></div>
    </div>
</main>

<div class="bottom-dock" id="bottomDock">
    <div class="dock-add" id="dockAddBtn">
        <span class="dock-icon">+</span>
        <span class="dock-label">添加</span>
    </div>
</div>

<div class="dock-modal-overlay" id="dockModal">
    <div class="dock-modal">
        <h3>添加工具</h3>
        <div class="dock-modal-field">
            <label>工具名称</label>
            <input type="text" id="toolName" placeholder="例如：DeepSeek" maxlength="8">
        </div>
        <div class="dock-modal-field">
            <label>网址</label>
            <input type="url" id="toolUrl" placeholder="https://example.com">
        </div>
        <div class="dock-modal-field">
            <label>图标网址 <span style="opacity:0.5;font-size:0.65rem">（留空自动获取网站图标）</span></label>
            <input type="url" id="toolIconUrl" placeholder="留空则自动获取">
        </div>
        <div class="dock-modal-btns">
            <button class="dock-modal-cancel" id="dockCancel">取消</button>
            <button class="dock-modal-confirm" id="dockConfirm">添加</button>
        </div>
    </div>
</div>

    <script src="file/aplayer/APlayer.min.js"></script>
    <script src="file/dock tool/dock.js"></script>
    <script>
    const clock = document.getElementById('clock');
    const dateElement = document.getElementById('date');
    let lastDate = '', lastTime = '';
    function updateDateTime() {
        const now = new Date();
        const y = now.getFullYear();
        const m = String(now.getMonth()+1).padStart(2,'0');
        const d = String(now.getDate()).padStart(2,'0');
        const w = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'][now.getDay()];
        const dateStr = `${y} 年 ${m} 月 ${d} 日 ${w}`;
        if(dateStr!==lastDate){dateElement.textContent=dateStr; lastDate=dateStr;}
        const hh = String(now.getHours()).padStart(2,'0');
        const mm = String(now.getMinutes()).padStart(2,'0');
        const ss = String(now.getSeconds()).padStart(2,'0');
        const timeStr = `${hh}:${mm}:${ss}`;
        if(timeStr!==lastTime){clock.textContent=timeStr; lastTime=timeStr;}
        requestAnimationFrame(updateDateTime);
    }
    updateDateTime();

    // Music Player - Aplayer
    let musicConfig = {
        platforms: {
            netease: 'https://music.163.com/#/song?id=1974443814',
            qq: 'https://y.qq.com/n/ryqq/songDetail/001R1a2x3z6WYa',
            bilibili: 'https://www.bilibili.com/video/BV1Mh411s7ZD'
        },
        playlist: [
            { name: '命に嫌われている', artist: 'カンザキイオリ', url: 'file/music/music.mp3', cover: '', lrc: 'file/music/lyrics.lrc' }
        ]
    };

    let ap = null;

    function initAplayer(playlist) {
        const container = document.getElementById('aplayer');
        container.innerHTML = '';
        if (ap) { ap.destroy(); ap = null; }
        if (!playlist || playlist.length === 0) return;
        ap = new APlayer({
            container: container,
            mini: false,
            autoplay: false,
            lrcType: 3,
            mutex: true,
            preload: 'auto',
            volume: 0.7,
            audio: playlist.map(t => ({
                name: t.name,
                artist: t.artist,
                url: t.url,
                cover: t.cover || '',
                lrc: t.lrc || ''
            }))
        });
    }

    async function loadMusicConfig() {
        try {
            const resp = await fetch('file/configuration/config.json');
            if (resp.ok) {
                const cfg = await resp.json();
                if (cfg.music) {
                    if (cfg.music.platforms) musicConfig.platforms = cfg.music.platforms;
                    if (cfg.music.playlist && cfg.music.playlist.length) {
                        musicConfig.playlist = cfg.music.playlist.map(t => ({
                            name: t.name,
                            artist: t.artist,
                            url: t.file || t.url || '',
                            cover: t.cover || '',
                            lrc: t.lyrics || t.lrc || ''
                        }));
                    }
                }
            }
        } catch {}
        const s = SettingsManager.load();
        if (s.platforms) musicConfig.platforms = s.platforms;
        if (s.playlist && s.playlist.length) {
            musicConfig.playlist = s.playlist.map(t => ({
                name: t.name,
                artist: t.artist,
                url: t.file || t.url || '',
                cover: t.cover || '',
                lrc: t.lyrics || t.lrc || ''
            }));
        }
        initAplayer(musicConfig.playlist);
    }

    // Init Dock
    DockManager.init();

    // Settings Panel
    const SettingsManager = {
        defaults: null,
        localStorageKey: 'nemuran_settings',

        async init() {
            try {
                const configResp = await fetch('file/configuration/config.json');
                this.defaults = configResp.ok ? await configResp.json() : {};
            } catch {
                this.defaults = {};
            }
        },

        load() {
            const d = this.defaults || {};
            let u = {};
            try {
                u = JSON.parse(localStorage.getItem(this.localStorageKey) || '{}');
            } catch {}
            return {
                nickname: u.nickname || '',
                siteTitle: u.siteTitle || d.site?.title || 'nemuran.me',
                glassEffect: u.glassEffect ?? d.display?.glassEffect ?? true,
                showDock: u.showDock ?? d.display?.showDock ?? true,
                platforms: {
                    netease: u.platforms?.netease || d.music?.platforms?.netease || '',
                    qq: u.platforms?.qq || d.music?.platforms?.qq || '',
                    bilibili: u.platforms?.bilibili || d.music?.platforms?.bilibili || ''
                },
                playlist: u.playlist || d.music?.playlist || []
            };
        },

        save(settings) {
            const data = {
                nickname: settings.nickname,
                siteTitle: settings.siteTitle,
                glassEffect: settings.glassEffect,
                showDock: settings.showDock,
                platforms: settings.platforms,
                playlist: settings.playlist
            };
            localStorage.setItem(this.localStorageKey, JSON.stringify(data));
        },

        exportConfig() {
            const settings = this.load();
            const blob = new Blob([JSON.stringify(settings, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'nemuran-config.json';
            a.click();
            URL.revokeObjectURL(url);
        },

        importConfig(jsonStr) {
            try {
                const imported = JSON.parse(jsonStr);
                localStorage.setItem(this.localStorageKey, JSON.stringify(imported));
                return true;
            } catch {
                return false;
            }
        },

        resetConfig() {
            localStorage.removeItem(this.localStorageKey);
        },

        apply(settings) {
            if (settings.siteTitle) document.title = settings.siteTitle;

            document.querySelectorAll('.glass-card').forEach(card => {
                card.style.backdropFilter = settings.glassEffect ? '' : 'none';
                card.style.webkitBackdropFilter = settings.glassEffect ? '' : 'none';
                card.style.background = settings.glassEffect ? '' : 'rgba(0,0,0,0.6)';
            });

            const dock = document.getElementById('bottomDock');
            if (dock) dock.style.display = settings.showDock ? '' : 'none';

            musicConfig.platforms = settings.platforms || musicConfig.platforms;
        }
    };

    const settingsData = SettingsManager.load();
    SettingsManager.apply(settingsData);
    loadMusicConfig();

    const settingsBtn = document.getElementById('settingsBtn');
    const settingsOverlay = document.getElementById('settingsOverlay');
    const settingsClose = document.getElementById('settingsClose');
    const advancedOverlay = document.getElementById('advancedOverlay');
    const advancedClose = document.getElementById('advancedClose');
    const goAdvanced = document.getElementById('goAdvanced');
    const settingNickname = document.getElementById('settingNickname');
    const settingSiteTitle = document.getElementById('settingSiteTitle');
    const settingNetease = document.getElementById('settingNetease');
    const settingQQ = document.getElementById('settingQQ');
    const settingBilibili = document.getElementById('settingBilibili');
    const toggleGlass = document.getElementById('toggleGlass');
    const toggleDock = document.getElementById('toggleDock');
    const settingsSave = document.getElementById('settingsSave');
    const settingsReset = document.getElementById('settingsReset');
    const settingsExport = document.getElementById('settingsExport');
    const settingsImport = document.getElementById('settingsImport');
    const importFileInput = document.getElementById('importFileInput');

    function openSettings() {
        const s = SettingsManager.load();
        settingNickname.value = s.nickname || '';
        settingSiteTitle.value = s.siteTitle;
        toggleGlass.classList.toggle('active', s.glassEffect);
        toggleDock.classList.toggle('active', s.showDock);
        settingsOverlay.classList.add('active');
    }

    function closeSettings() { settingsOverlay.classList.remove('active'); }

    function openAdvanced() {
        const s = SettingsManager.load();
        settingNetease.value = s.platforms.netease || '';
        settingQQ.value = s.platforms.qq || '';
        settingBilibili.value = s.platforms.bilibili || '';
        advancedOverlay.classList.add('active');
    }

    function closeAdvanced() { advancedOverlay.classList.remove('active'); }

    settingsBtn.addEventListener('click', openSettings);
    settingsClose.addEventListener('click', closeSettings);
    settingsOverlay.addEventListener('click', (e) => { if (e.target === settingsOverlay) closeSettings(); });
    goAdvanced.addEventListener('click', openAdvanced);
    advancedClose.addEventListener('click', closeAdvanced);
    advancedOverlay.addEventListener('click', (e) => { if (e.target === advancedOverlay) closeAdvanced(); });

    toggleGlass.addEventListener('click', () => toggleGlass.classList.toggle('active'));
    toggleDock.addEventListener('click', () => toggleDock.classList.toggle('active'));

    settingsSave.addEventListener('click', () => {
        const nickname = settingNickname.value.trim();
        if (!nickname) {
            settingNickname.style.borderColor = 'rgba(255,80,80,0.6)';
            settingNickname.focus();
            setTimeout(() => { settingNickname.style.borderColor = ''; }, 2000);
            return;
        }
        const current = SettingsManager.load();
        const newSettings = {
            nickname: nickname,
            siteTitle: settingSiteTitle.value.trim() || current.siteTitle,
            glassEffect: toggleGlass.classList.contains('active'),
            showDock: toggleDock.classList.contains('active'),
            platforms: {
                netease: settingNetease.value.trim(),
                qq: settingQQ.value.trim(),
                bilibili: settingBilibili.value.trim()
            },
            playlist: current.playlist
        };
        SettingsManager.save(newSettings);
        SettingsManager.apply(newSettings);
        loadMusicConfig();
        closeSettings();
    });

    settingsExport.addEventListener('click', () => {
        SettingsManager.exportConfig();
    });

    settingsImport.addEventListener('click', () => importFileInput.click());
    importFileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            if (SettingsManager.importConfig(ev.target.result)) {
                closeAdvanced();
                location.reload();
            } else {
                alert('配置文件格式错误');
            }
        };
        reader.readAsText(file);
        importFileInput.value = '';
    });

    settingsReset.addEventListener('click', () => {
        SettingsManager.resetConfig();
        SettingsManager.apply(SettingsManager.load());
        closeAdvanced();
        closeSettings();
        location.reload();
    });
</script>

</body>
</html>
