<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="nemuran.me - 空气喵的小站">
    <meta name="theme-color" content="#333">
    <link rel="preload" href="background.webp" as="image">
    <link rel="icon" href="imgs/favicon_io/favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="imgs/favicon_io/favicon.ico" type="image/x-icon">
    <title>nemuran.me</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        @keyframes fadeInUpBlur {
            0% { opacity: 0; transform: translateY(40px); filter: blur(10px); }
            100% { opacity: 1; transform: translateY(0); filter: blur(0); }
        }
        @keyframes fadeInText {
            0% { opacity: 0; transform: translateY(12px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes float {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        @keyframes subtleShine {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        body {
            min-height: 100vh;
            background: #000;
            background: url("background.webp") center/cover no-repeat fixed;
            color: #fff;
            position: relative;
            overflow: hidden;
            perspective: 1500px;
        }
        body::before {
            content: ""; position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(0,0,0,0.25) 0%, rgba(0,0,0,0.05) 100%);
            z-index: 0;
        }
        body::after {
            content: ""; position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
            background-size: 45px 45px;
            z-index: 0; animation: float 25s linear infinite;
        }

        .container {
            position: absolute; top: 2.5rem; left: 2.5rem;
            z-index: 1; display: flex; flex-direction: column; gap: 1.2rem;
        }
        .glass-card {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.25), 0 0 0 1px rgba(255,255,255,0.1), inset 0 1px 0 rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.5s cubic-bezier(0.4,0,0.2,1);
            position: relative; overflow: hidden;
            animation: fadeInUpBlur 1.4s cubic-bezier(0.22,1,0.36,1) both;
        }
        .glass-card::before {
            content: ''; position: absolute; top:0; left:0; width:100%; height:100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            z-index:0; animation: subtleShine 8s infinite linear;
        }
        .glass-card:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-6px);
            box-shadow: 0 16px 48px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.18);
        }

        .time-card {
            padding: 2.4rem 2.2rem; text-align: center; max-width: 380px;
            animation-delay: 0.2s;
        }
        .site-intro {
            padding: 1.8rem 2rem; max-width: 380px;
            animation-delay: 0.4s;
        }
        .site-intro h3 {
            font-size: 1.3rem; margin-bottom: 1rem; color: rgba(255,255,255,0.95);
            font-weight: 500; letter-spacing: 0.5px;
            animation: fadeInText 1.5s ease-out 0.5s both;
            position: relative; z-index:1;
        }
        .site-intro p {
            font-size: 0.95rem; line-height: 1.6; color: rgba(255,255,255,0.85);
            font-weight: 300; letter-spacing: 0.5px;
            animation: fadeInText 1.5s ease-out 0.6s both;
            position: relative; z-index:1;
        }
        .date-info {
            font-size: 1rem; margin-bottom: 1rem; opacity: 0.9;
            color: rgba(255,255,255,0.85); font-weight: 300; letter-spacing: 1px;
            animation: fadeInText 1.5s ease-out 0.4s both;
            position: relative; z-index:1;
        }
        .clock-display {
            font-size: 3.4rem; font-weight: 300; letter-spacing: 8px; margin:1rem 0;
            font-variant-numeric: tabular-nums; color: rgba(255,255,255,1);
            text-shadow: 0 0 20px rgba(255,255,255,0.25), 0 4px 12px rgba(0,0,0,0.3);
            min-width: 280px; display: inline-block; text-align: center; line-height:1;
            transition: all 0.4s ease;
            animation: fadeInText 1.5s ease-out 0.5s both;
            position: relative; z-index:1;
        }
        .time-card:hover .clock-display {
            text-shadow: 0 0 30px rgba(255,255,255,0.4), 0 6px 20px rgba(0,0,0,0.4);
            transform: scale(1.03);
        }

        .music-card {
            padding: 1.2rem; max-width: 360px;
            animation-delay: 0.6s;
            position: relative; z-index:1;
            overflow: visible;
        }
        .music-top {
            display: flex; gap: 0.8rem; align-items: center; margin-bottom: 0.6rem;
        }
        .music-cover {
            width: 52px; height: 52px; border-radius: 50%; overflow: hidden;
            flex-shrink: 0; border: 2px solid rgba(255,255,255,0.15);
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
        }
        .music-cover img {
            width: 100%; height: 100%; object-fit: cover;
        }
        .music-meta { flex: 1; min-width: 0; }
        .music-tag {
            display: inline-block; font-size: 0.65rem; color: rgba(255,255,255,0.6);
            border: 1px solid rgba(255,255,255,0.2); border-radius: 4px;
            padding: 2px 8px; margin-bottom: 0.4rem; letter-spacing: 1px;
        }
        .music-title {
            font-size: 1rem; font-weight: 500; color: rgba(255,255,255,0.95);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .music-artist {
            font-size: 0.75rem; color: rgba(255,255,255,0.6); margin-top: 0.15rem;
        }
        .lyric-container {
            height: 48px; overflow: hidden; position: relative;
            margin-bottom: 0.5rem; margin-top: -0.2rem; text-align: center;
            mask-image: linear-gradient(transparent, black 15%, black 85%, transparent);
            -webkit-mask-image: linear-gradient(transparent, black 15%, black 85%, transparent);
        }
        .lyric-inner {
            transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
        }
        .lyric-line {
            font-size: 0.75rem; color: rgba(255,255,255,0.35);
            line-height: 1.6; height: 1.6em;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            transition: all 0.35s ease;
        }
        .lyric-line.active {
            color: rgba(255,255,255,0.95); font-size: 0.8rem;
        }
        .lyric-placeholder {
            font-size: 0.75rem; color: rgba(255,255,255,0.35);
            line-height: 3em;
        }
        .music-progress {
            display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.6rem;
        }
        .music-progress .time {
            font-size: 0.65rem; color: rgba(255,255,255,0.5);
            min-width: 28px; font-variant-numeric: tabular-nums;
        }
        .progress-bar {
            flex: 1; height: 3px; background: rgba(255,255,255,0.15);
            border-radius: 2px; cursor: pointer; position: relative;
        }
        .progress-fill {
            height: 100%; background: rgba(255,255,255,0.7); border-radius: 2px;
            width: 0%; transition: width 0.1s linear;
        }
        .music-controls {
            display: flex; align-items: center; justify-content: center; gap: 1.2rem;
            position: relative;
        }
        .platform-btn {
            position: absolute; right: 0; bottom: -0.3rem;
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
            border-radius: 20px; padding: 0.25rem 0.6rem;
            color: rgba(255,255,255,0.6); font-size: 0.65rem;
            cursor: pointer; transition: all 0.3s;
            display: flex; align-items: center; gap: 0.25rem;
        }
        .platform-btn:hover { background: rgba(255,255,255,0.18); color: rgba(255,255,255,0.9); }
        .platform-menu {
            position: absolute; right: 0; bottom: 2.5rem;
            background: rgba(20,20,35,0.85);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px; padding: 0.4rem;
            min-width: 150px; opacity: 0;
            transform: translateY(8px); pointer-events: none;
            transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
            z-index: 10;
        }
        .platform-menu.active {
            opacity: 1; transform: translateY(0); pointer-events: auto;
        }
        .platform-item {
            display: flex; align-items: center; gap: 0.5rem;
            padding: 0.45rem 0.7rem; border-radius: 8px;
            color: rgba(255,255,255,0.75); font-size: 0.75rem;
            cursor: pointer; transition: all 0.2s;
        }
        .platform-item:hover {
            background: rgba(255,255,255,0.1); color: #fff;
        }
        .platform-item .icon { font-size: 0.9rem; }
        .ctrl-btn {
            background: none; border: none; color: rgba(255,255,255,0.7);
            cursor: pointer; font-size: 1rem; padding: 0.2rem;
            transition: all 0.3s;
        }
        .ctrl-btn:hover { color: rgba(255,255,255,1); transform: scale(1.1); }
        .play-btn {
            width: 38px; height: 38px; border-radius: 50%; border: none;
            background: linear-gradient(135deg, rgba(138,180,248,0.6), rgba(167,139,250,0.6));
            color: #fff; font-size: 1rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 20px rgba(138,180,248,0.3);
            transition: all 0.3s;
            line-height: 1;
        }
        .play-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 28px rgba(138,180,248,0.5);
        }

        @media (max-width:768px){
            .container{top:1.5rem; left:1.5rem; gap:1rem;}
            .time-card{padding:2rem 1.8rem; max-width:320px; border-radius:20px;}
            .site-intro,.music-card{padding:1.2rem 1.5rem; max-width:320px; border-radius:20px;}
            .clock-display{font-size:2.8rem; letter-spacing:5px; min-width:230px;}
            .music-cover{width:56px; height:56px;}
        }
        @media (max-width:480px){
            .container{top:1rem; left:1rem; right:1rem; gap:0.8rem;}
            .time-card,.site-intro,.music-card{padding:1.2rem; max-width:100%;}
            .clock-display{font-size:2.2rem; letter-spacing:4px; min-width:180px;}
        }
    </style>
</head>
<body>

<main class="container">
    <div class="glass-card time-card">
        <div class="date-info" id="date"></div>
        <div class="clock-display" id="clock"></div>
    </div>
    <div class="glass-card site-intro">
        <h3>关于本站</h3>
        <p>由 空气喵 创建的网站</p>
    </div>
    <div class="glass-card music-card">
        <div class="music-top">
            <div class="music-cover">
                <img id="coverImg" alt="封面">
            </div>
            <div class="music-meta">
                <div class="music-title" id="musicTitle">未播放</div>
                <div class="music-artist" id="musicArtist">-</div>
            </div>
        </div>
        <div class="lyric-container" id="lyricContainer">
            <div class="lyric-inner" id="lyricInner">
                <div class="lyric-placeholder">暂无歌词</div>
            </div>
        </div>
        <div class="music-progress">
            <span class="time" id="currentTime">00:00</span>
            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <span class="time" id="duration">00:00</span>
        </div>
        <div class="music-controls">
            <button class="ctrl-btn" id="prevBtn">⏮</button>
            <button class="play-btn" id="playBtn">▶</button>
            <button class="ctrl-btn" id="nextBtn">⏭</button>
            <button class="platform-btn" id="platformBtn">♫ 源</button>
            <div class="platform-menu" id="platformMenu">
                <div class="platform-item" data-platform="netease"><span class="icon">🎵</span>网易云音乐</div>
                <div class="platform-item" data-platform="qq"><span class="icon">🎵</span>QQ音乐</div>
                <div class="platform-item" data-platform="bilibili"><span class="icon">📺</span>Bilibili</div>
                <div class="platform-item" data-platform="local"><span class="icon">💾</span>本地播放</div>
            </div>
        </div>
        <audio id="audio" preload="auto">
            <source src="file/music/music.mp3" type="audio/mpeg">
        </audio>
    </div>
</main>

    <script src="file/js/jsmediatags.min.js"></script>
    <script>
    const clock = document.getElementById('clock');
    const dateElement = document.getElementById('date');
    let lastDate = '', lastTime = '';
    function updateDateTime() {
        const now = new Date();
        const y = now.getFullYear();
        const m = String(now.getMonth()+1).padStart(2,'0');
        const d = String(now.getDate()).padStart(2,'0');
        const w = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'][now.getDay()];
        const dateStr = `${y} 年 ${m} 月 ${d} 日 ${w}`;
        if(dateStr!==lastDate){dateElement.textContent=dateStr; lastDate=dateStr;}
        const hh = String(now.getHours()).padStart(2,'0');
        const mm = String(now.getMinutes()).padStart(2,'0');
        const ss = String(now.getSeconds()).padStart(2,'0');
        const timeStr = `${hh}:${mm}:${ss}`;
        if(timeStr!==lastTime){clock.textContent=timeStr; lastTime=timeStr;}
        requestAnimationFrame(updateDateTime);
    }
    updateDateTime();

    // Music Player
    const audio = document.getElementById('audio');
    const playBtn = document.getElementById('playBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const currentTimeEl = document.getElementById('currentTime');
    const durationEl = document.getElementById('duration');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    const platformBtn = document.getElementById('platformBtn');
    const platformMenu = document.getElementById('platformMenu');

    const musicConfig = {
        title: '命に嫌われている',
        artist: 'カンザキイオリ',
        platforms: {
            netease: 'https://music.163.com/#/song?id=1974443814',
            qq: 'https://y.qq.com/n/ryqq/songDetail/001R1a2x3z6WYa',
            bilibili: 'https://www.bilibili.com/video/BV1Mh411s7ZD'
        }
    };

    document.getElementById('musicTitle').textContent = musicConfig.title;
    document.getElementById('musicArtist').textContent = musicConfig.artist;

    // Lyrics
    const lyricInner = document.getElementById('lyricInner');
    const lyricContainer = document.getElementById('lyricContainer');
    let lyrics = [];
    let currentLyricIndex = -1;

    function parseLRC(text) {
        const lines = text.split('\n');
        const result = [];
        const regex = /\[(\d{2}):(\d{2})\.(\d{2,3})\](.*)/;
        for (const line of lines) {
            const match = line.match(regex);
            if (match) {
                const min = parseInt(match[1]);
                const sec = parseInt(match[2]);
                const ms = parseInt(match[3].padEnd(3, '0'));
                const time = min * 60 + sec + ms / 1000;
                const text = match[4].trim();
                if (text) result.push({ time, text });
            }
        }
        return result.sort((a, b) => a.time - b.time);
    }

    function renderLyrics() {
        if (lyrics.length === 0) {
            lyricInner.innerHTML = '<div class="lyric-placeholder">暂无歌词</div>';
            return;
        }
        lyricInner.innerHTML = lyrics.map((l, i) =>
            `<div class="lyric-line" data-index="${i}">${l.text}</div>`
        ).join('');
    }

    function updateLyric() {
        if (lyrics.length === 0) return;
        const ct = audio.currentTime;
        let idx = -1;
        for (let i = lyrics.length - 1; i >= 0; i--) {
            if (ct >= lyrics[i].time) { idx = i; break; }
        }
        if (idx !== currentLyricIndex) {
            currentLyricIndex = idx;
            document.querySelectorAll('.lyric-line').forEach((el, i) => {
                el.classList.toggle('active', i === idx);
            });
            if (idx >= 0) {
                const lineH = 28;
                const offset = -idx * lineH + lyricContainer.clientHeight / 2 - lineH / 2;
                lyricInner.style.transform = `translateY(${offset}px)`;
            }
        }
    }

    fetch('file/music/lyrics.lrc')
        .then(r => r.ok ? r.text() : '')
        .then(text => {
            if (text) {
                lyrics = parseLRC(text);
                renderLyrics();
            }
        })
        .catch(() => {});

    jsmediatags.read(audio.querySelector('source').src, {
        onSuccess: function(tag) {
            var tags = tag.tags;
            if (tags.picture) {
                var image = tags.picture;
                var base64 = '';
                for (var i = 0; i < image.data.length; i++) {
                    base64 += String.fromCharCode(image.data[i]);
                }
                var cover = 'data:' + image.format + ';base64,' + window.btoa(base64);
                document.getElementById('coverImg').src = cover;
            }
        },
        onError: function(error) {
            document.getElementById('coverImg').src = 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect fill="%23333" width="64" height="64" rx="32"/><text x="32" y="38" font-size="24" fill="%23888" text-anchor="middle">♫</text></svg>';
        }
    });

    platformBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        platformMenu.classList.toggle('active');
    });

    document.addEventListener('click', () => platformMenu.classList.remove('active'));

    document.querySelectorAll('.platform-item').forEach(item => {
        item.addEventListener('click', (e) => {
            e.stopPropagation();
            const p = item.dataset.platform;
            if (p === 'local') {
                audio.play().catch(() => {});
                playBtn.textContent = '⏸';
            } else if (musicConfig.platforms[p]) {
                window.open(musicConfig.platforms[p], '_blank');
            }
            platformMenu.classList.remove('active');
        });
    });

    function formatTime(s) {
        const m = Math.floor(s / 60);
        const sec = Math.floor(s % 60);
        return String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
    }

    playBtn.addEventListener('click', () => {
        if (audio.paused) { audio.play(); playBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="5" y="4" width="5" height="16" rx="1"/><rect x="14" y="4" width="5" height="16" rx="1"/></svg>'; }
        else { audio.pause(); playBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="6,4 20,12 6,20"/></svg>'; }
    });

    audio.addEventListener('timeupdate', () => {
        currentTimeEl.textContent = formatTime(audio.currentTime);
        if (audio.duration) {
            progressFill.style.width = (audio.currentTime / audio.duration * 100) + '%';
        }
        updateLyric();
    });

    audio.addEventListener('loadedmetadata', () => {
        durationEl.textContent = formatTime(audio.duration);
    });

    audio.addEventListener('ended', () => {
        playBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="6,4 20,12 6,20"/></svg>';
        progressFill.style.width = '0%';
        currentLyricIndex = -1;
    });

    progressBar.addEventListener('click', (e) => {
        const rect = progressBar.getBoundingClientRect();
        const x = (e.clientX - rect.left) / rect.width;
        audio.currentTime = x * audio.duration;
    });
</script>

</body>
</html>
