<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nemuran.me 后台管理</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #0f0f1a; color: #e0e0e0; min-height: 100vh; }

        .layout { display: flex; min-height: 100vh; }
        .sidebar { width: 220px; background: rgba(18,18,32,0.95); border-right: 1px solid rgba(255,255,255,0.06); padding: 1.5rem 0; flex-shrink: 0; position: fixed; height: 100vh; overflow-y: auto; }
        .sidebar h3 { padding: 0 1.2rem; font-size: 0.9rem; color: rgba(138,180,248,0.8); margin-bottom: 1rem; }
        .sidebar a { display: flex; align-items: center; gap: 0.6rem; padding: 0.6rem 1.2rem; color: rgba(255,255,255,0.6); text-decoration: none; font-size: 0.85rem; transition: all 0.2s; }
        .sidebar a:hover, .sidebar a.active { background: rgba(138,180,248,0.1); color: rgba(255,255,255,0.9); }
        .sidebar a.active { border-right: 2px solid rgba(138,180,248,0.6); }
        .sidebar-footer { position: absolute; bottom: 0; width: 100%; padding: 1rem 1.2rem; border-top: 1px solid rgba(255,255,255,0.06); }

        .main { margin-left: 220px; flex: 1; padding: 2rem; }
        .main h2 { font-size: 1.1rem; font-weight: 500; margin-bottom: 1.5rem; color: rgba(255,255,255,0.9); }

        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-size: 0.78rem; color: rgba(255,255,255,0.5); margin-bottom: 0.3rem; }
        .form-input { width: 100%; padding: 0.6rem 0.8rem; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; color: #fff; font-size: 0.85rem; outline: none; transition: all 0.3s; }
        .form-input:focus { border-color: rgba(138,180,248,0.4); box-shadow: 0 0 0 3px rgba(138,180,248,0.08); }
        .form-input::placeholder { color: rgba(255,255,255,0.2); }

        .btn { padding: 0.55rem 1.2rem; border-radius: 10px; border: none; font-size: 0.82rem; cursor: pointer; transition: all 0.25s; font-weight: 500; }
        .btn-primary { background: linear-gradient(135deg, rgba(88,150,255,0.6), rgba(138,180,248,0.7)); color: #fff; }
        .btn-primary:hover { background: linear-gradient(135deg, rgba(88,150,255,0.8), rgba(138,180,248,0.9)); }
        .btn-danger { background: rgba(255,60,60,0.15); color: rgba(255,120,120,0.9); }
        .btn-danger:hover { background: rgba(255,60,60,0.25); }
        .btn-ghost { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.08); }
        .btn-ghost:hover { background: rgba(255,255,255,0.08); color: #fff; }
        .btn-sm { padding: 0.35rem 0.7rem; font-size: 0.75rem; }

        .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 1.2rem; margin-bottom: 1rem; }
        .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }

        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
        th { text-align: left; padding: 0.6rem 0.8rem; color: rgba(255,255,255,0.4); font-weight: 500; border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; }
        td { padding: 0.6rem 0.8rem; border-bottom: 1px solid rgba(255,255,255,0.04); }
        tr:hover td { background: rgba(255,255,255,0.02); }

        .actions { display: flex; gap: 0.4rem; }

        .toast { position: fixed; bottom: 2rem; right: 2rem; padding: 0.7rem 1.2rem; border-radius: 10px; font-size: 0.82rem; z-index: 999; animation: slideIn 0.3s ease; }
        .toast-success { background: rgba(60,180,80,0.9); color: #fff; }
        .toast-error { background: rgba(255,60,60,0.9); color: #fff; }
        @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .modal { background: rgba(18,18,32,0.95); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 1.5rem; width: 90%; max-width: 480px; }
        .modal h3 { font-size: 1rem; margin-bottom: 1rem; }
        .modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 1.2rem; }

        .empty { text-align: center; padding: 3rem; color: rgba(255,255,255,0.3); font-size: 0.85rem; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        @media (max-width: 768px) { .sidebar { display: none; } .main { margin-left: 0; } .grid-2 { grid-template-columns: 1fr; } }

        textarea.form-input { min-height: 120px; resize: vertical; font-family: monospace; font-size: 0.8rem; }
        .picture-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 0.8rem; }
        .picture-thumb { aspect-ratio: 16/10; border-radius: 10px; overflow: hidden; border: 2px solid rgba(255,255,255,0.06); cursor: pointer; position: relative; transition: all 0.25s; }
        .picture-thumb:hover { border-color: rgba(138,180,248,0.4); }
        .picture-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .picture-thumb .wp-actions { position: absolute; top: 4px; right: 4px; display: flex; gap: 4px; opacity: 0; transition: opacity 0.2s; }
        .picture-thumb:hover .wp-actions { opacity: 1; }

        .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 200; cursor: pointer; animation: fadeIn 0.2s ease; }
        .lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; box-shadow: 0 8px 40px rgba(0,0,0,0.5); object-fit: contain; }
        .lightbox-close { position: absolute; top: 1rem; right: 1.5rem; color: #fff; font-size: 2rem; cursor: pointer; opacity: 0.7; transition: opacity 0.2s; }
        .lightbox-close:hover { opacity: 1; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
    const API = window.location.origin + '/api';
    let token = localStorage.getItem('user_token');
    let userInfo = null;
    let currentPage = 'songs';

    function api(path, opts = {}) {
        const headers = { 'Content-Type': 'application/json' };
        if (token) headers['Authorization'] = 'Bearer ' + token;
        return fetch(API + path, { ...opts, headers: { ...headers, ...opts.headers } })
            .then(async r => {
                if (r.status === 401) { token = null; userInfo = null; localStorage.removeItem('user_token'); location.href = '/login'; return null; }
                if (r.status === 403) { toast('权限不足', 'error'); return null; }
                return r.json();
            });
    }

    function toast(msg, type = 'success') {
        const el = document.createElement('div');
        el.className = 'toast toast-' + type;
        el.textContent = msg;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 2500);
    }

    async function render() {
        const app = document.getElementById('app');
        if (!token) { location.href = '/login'; return; }
        try {
            const res = await fetch(API + '/auth/me', { headers: { 'Authorization': 'Bearer ' + token } }).then(r => r.json());
            if (!res.user) {
                token = null;
                localStorage.removeItem('user_token');
                location.href = '/login';
                return;
            }
            userInfo = res.user;
            renderLayout(app);
        } catch {
            token = null;
            localStorage.removeItem('user_token');
            location.href = '/login';
        }
    }

    function renderLayout(app) {
        const isAdmin = userInfo?.role === 'admin';
        const pages = isAdmin ? [
            { id: 'songs', icon: '♫', label: '歌曲管理' },
            { id: 'wallpapers', icon: '🖼', label: '图片管理' },
            { id: 'dock', icon: '📌', label: '底栏工具' },
            { id: 'settings', icon: '⚙', label: '站点设置' },
            { id: 'profile', icon: '👤', label: '个人资料' },
        ] : [
            { id: 'songs', icon: '♫', label: '歌曲列表' },
            { id: 'profile', icon: '👤', label: '个人资料' },
        ];
        const roleLabel = isAdmin ? '管理员' : '用户';
        app.innerHTML = `
        <div class="layout">
            <div class="sidebar">
                <h3>nemuran.me <span style="font-size:0.7rem;opacity:0.5">${roleLabel}</span></h3>
                ${pages.map(p => `<a href="#" class="${p.id === currentPage ? 'active' : ''}" onclick="navigate('${p.id}');return false;">${p.icon} ${p.label}</a>`).join('')}
                <div class="sidebar-footer">
                    <a href="/" target="_blank">🌐 查看网站</a>
                    <a href="#" onclick="logout();return false;">🚪 退出登录</a>
                </div>
            </div>
            <div class="main" id="mainContent"></div>
        </div>`;
        renderPage();
    }

    function navigate(page) { currentPage = page; renderLayout(document.getElementById('app')); }
    function logout() { token = null; userInfo = null; localStorage.removeItem('user_token'); location.href = '/login'; }

    async function renderPage() {
        const main = document.getElementById('mainContent');
        switch (currentPage) {
            case 'songs': return renderSongs(main);
            case 'wallpapers': return renderPictures(main);
            case 'dock': return renderDock(main);
            case 'settings': return renderSettings(main);
            case 'profile': return renderProfile(main);
        }
    }

    async function renderSongs(el) {
        const songs = await api('/music') || [];
        const isAdmin = userInfo?.role === 'admin';
        if (isAdmin) {
            el.innerHTML = `
        <div class="card-header"><h2>歌曲管理</h2><div class="actions">
            <button class="btn btn-primary btn-sm" onclick="uploadMusic()">+ 上传音乐</button>
        </div></div>
        <div class="card"><div class="table-wrap"><table>
            <thead><tr><th>ID</th><th>歌名</th><th>歌手</th><th>文件夹</th><th>操作</th></tr></thead>
            <tbody>${songs.length ? songs.map(s => `
                <tr><td>#${s.id}</td><td>${s.title}</td><td>${s.artist}</td><td style="color:rgba(255,255,255,0.4);font-size:0.75rem">${s.folder}</td>
                <td class="actions">
                    <button class="btn btn-ghost btn-sm" onclick="editSong(${s.id})">编辑</button>
                    <button class="btn btn-danger btn-sm" onclick="deleteSong(${s.id},'${s.title.replace(/'/g,"\\'")}')">删除</button>
                </td></tr>`).join('') : '<tr><td colspan="5" class="empty">暂无歌曲</td></tr>'}
            </tbody></table></div></div>`;
        } else {
            el.innerHTML = `
        <h2>歌曲列表</h2>
        <div class="card"><div class="table-wrap"><table>
            <thead><tr><th>#</th><th>歌名</th><th>歌手</th></tr></thead>
            <tbody>${songs.length ? songs.map((s, i) => `
                <tr><td>${i + 1}</td><td>${s.title}</td><td style="color:rgba(255,255,255,0.5)">${s.artist}</td></tr>`
            ).join('') : '<tr><td colspan="3" class="empty">暂无歌曲</td></tr>'}
            </tbody></table></div></div>`;
        }
    }

    function uploadMusic() {
        const input = document.createElement('input');
        input.type = 'file'; input.accept = '.mp3,.flac,.wav,.ogg,.aac,.m4a,.wma'; input.multiple = true;
        input.onchange = async () => {
            const files = input.files;
            if (!files.length) return;
            try {
                const fd = new FormData();
                for (const file of files) fd.append('files', file);
                const uploadRes = await fetch(API + '/upload/music', {
                    method: 'POST', headers: { 'Authorization': 'Bearer ' + token }, body: fd
                });
                const uploadData = await uploadRes.json();
                if (!uploadData.success) {
                    toast(uploadData.error || '上传失败', 'error');
                    return;
                }
                for (const f of uploadData.files) {
                    await api('/music', { method: 'POST', body: JSON.stringify({ folder: f.folder, filename: f.filename }) });
                }
                toast('上传成功，共 ' + uploadData.files.length + ' 首');
                renderSongs(document.getElementById('mainContent'));
            } catch (e) {
                toast('上传出错: ' + e.message, 'error');
            }
        };
        input.click();
    }

    async function editSong(id) {
        const song = await api('/music/' + id);
        if (!song) return;
        showModal('编辑歌曲', `
            <div class="form-group"><label>歌名</label><input class="form-input" id="editTitle" value="${song.title}"></div>
            <div class="form-group"><label>歌手</label><input class="form-input" id="editArtist" value="${song.artist}"></div>
        `, async () => {
            const res = await api('/music/' + id, { method: 'PUT', body: JSON.stringify({
                title: document.getElementById('editTitle').value,
                artist: document.getElementById('editArtist').value
            })});
            if (res?.success) { toast('保存成功'); closeModal(); renderSongs(document.getElementById('mainContent')); }
        });
    }

    async function deleteSong(id, title) {
        if (!confirm(`确定删除「${title}」？`)) return;
        const res = await api('/music/' + id + '?deleteFile=true', { method: 'DELETE' });
        if (res?.success) { toast('已删除'); renderSongs(document.getElementById('mainContent')); }
    }

    async function renderPictures(el) {
        const wallpapers = await api('/picture') || [];
        el.innerHTML = `
        <div class="card-header"><h2>图片管理</h2><div class="actions">
            <button class="btn btn-primary btn-sm" onclick="uploadPicture()">+ 上传图片</button>
        </div></div>
        <div class="card"><div class="picture-grid">
            ${wallpapers.length ? wallpapers.map(w => `
                <div class="picture-thumb">
                    <img src="/file/picture/${w.filename}" alt="${w.filename}" onclick="previewPicture('/file/picture/${w.filename}')" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 160 100%22><rect fill=%22%23333%22 width=%22160%22 height=%22100%22/><text x=%2280%22 y=%2255%22 font-size=%2212%22 fill=%22%23666%22 text-anchor=%22middle%22>加载失败</text></svg>'">
                    <div class="wp-actions">
                        ${w.is_default ? '<span style="background:rgba(138,180,248,0.8);color:#fff;padding:2px 6px;border-radius:4px;font-size:0.65rem">默认</span>' : ''}
                        <button class="btn btn-danger btn-sm" onclick="deletePicture(${w.id},'${w.filename}')">删除</button>
                    </div>
                </div>
            `).join('') : '<div class="empty">暂无图片</div>'}
        </div></div>`;
    }

    function uploadPicture() {
        const input = document.createElement('input');
        input.type = 'file'; input.accept = 'image/*';
        input.onchange = async () => {
            const file = input.files[0];
            if (!file) return;
            try {
                const fd = new FormData();
                fd.append('file', file);
                const uploadRes = await fetch(API + '/upload/picture?type=wallpaper', {
                    method: 'POST', headers: { 'Authorization': 'Bearer ' + token }, body: fd
                });
                const uploadData = await uploadRes.json();
                if (!uploadData.success) {
                    toast(uploadData.error || '上传失败', 'error');
                    return;
                }
                const regRes = await api('/picture', { method: 'POST', body: JSON.stringify({ filename: uploadData.filename }) });
                if (regRes?.success) {
                    toast('上传成功'); renderPictures(document.getElementById('mainContent'));
                } else {
                    toast(regRes?.error || '图片注册失败', 'error');
                }
            } catch (e) {
                toast('上传出错: ' + e.message, 'error');
            }
        };
        input.click();
    }

    async function deletePicture(id, filename) {
        if (!confirm(`确定删除图片「${filename}」？`)) return;
        const res = await api('/picture/' + id + '?deleteFile=true', { method: 'DELETE' });
        if (res?.success) { toast('已删除'); renderPictures(document.getElementById('mainContent')); }
    }

    function previewPicture(src) {
        let scale = 1, panX = 0, panY = 0, dragging = false, startX, startY;
        const overlay = document.createElement('div');
        overlay.className = 'lightbox';
        overlay.innerHTML = `<span class="lightbox-close">&times;</span><img src="${src}">`;
        const img = overlay.querySelector('img');
        img.style.transition = 'transform 0.15s ease';
        function updateTransform() { img.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`; }
        function onWheel(e) {
            e.preventDefault();
            scale = Math.min(Math.max(scale + (e.deltaY > 0 ? -0.1 : 0.1), 0.2), 5);
            if (scale <= 1) { panX = 0; panY = 0; }
            updateTransform();
        }
        function onMouseDown(e) {
            if (scale <= 1) return;
            e.preventDefault();
            dragging = true;
            startX = e.clientX - panX;
            startY = e.clientY - panY;
            img.style.transition = 'none';
            img.style.cursor = 'grabbing';
        }
        function onMove(e) {
            if (!dragging) return;
            panX = e.clientX - startX;
            panY = e.clientY - startY;
            updateTransform();
        }
        function onUp() {
            if (!dragging) return;
            dragging = false;
            img.style.transition = 'transform 0.15s ease';
            img.style.cursor = '';
        }
        function escHandler(e) { if (e.key === 'Escape') closeOverlay(); }
        function closeOverlay() {
            overlay.remove();
            document.removeEventListener('keydown', escHandler);
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onUp);
        }
        img.addEventListener('wheel', onWheel, { passive: false });
        img.addEventListener('mousedown', onMouseDown);
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
        document.addEventListener('keydown', escHandler);
        overlay.addEventListener('click', (e) => { if (e.target === overlay || e.target.classList.contains('lightbox-close')) closeOverlay(); });
        document.body.appendChild(overlay);
    }

    async function renderDock(el) {
        const tools = await api('/dock') || [];
        el.innerHTML = `
        <div class="card-header"><h2>底栏工具</h2><div class="actions">
            <button class="btn btn-primary btn-sm" onclick="showAddTool()">+ 添加工具</button>
        </div></div>
        <div class="card"><div class="table-wrap"><table>
            <thead><tr><th>名称</th><th>URL</th><th>图标</th><th>操作</th></tr></thead>
            <tbody>${tools.length ? tools.map(t => `
                <tr><td>${t.name}</td><td style="color:rgba(255,255,255,0.4);font-size:0.75rem;max-width:200px;overflow:hidden;text-overflow:ellipsis">${t.url}</td>
                <td>${t.icon ? '<img src="'+t.icon+'" style="width:20px;height:20px;border-radius:4px">' : '-'}</td>
                <td class="actions">
                    <button class="btn btn-ghost btn-sm" onclick="editTool(${t.id})">编辑</button>
                    <button class="btn btn-danger btn-sm" onclick="deleteTool(${t.id})">删除</button>
                </td></tr>`).join('') : '<tr><td colspan="4" class="empty">暂无工具</td></tr>'}
            </tbody></table></div></div>`;
    }

    function showAddTool() {
        showModal('添加工具', `
            <div class="form-group"><label>工具名称</label><input class="form-input" id="toolName" maxlength="8"></div>
            <div class="form-group"><label>URL</label><input class="form-input" id="toolUrl" placeholder="https://example.com"></div>
            <div class="form-group"><label>图标URL（可选）</label><input class="form-input" id="toolIcon"></div>
        `, async () => {
            const res = await api('/dock', { method: 'POST', body: JSON.stringify({
                name: document.getElementById('toolName').value,
                url: document.getElementById('toolUrl').value,
                icon: document.getElementById('toolIcon').value
            })});
            if (res?.success) { toast('添加成功'); closeModal(); renderDock(document.getElementById('mainContent')); }
        });
    }

    async function editTool(id) {
        const tools = await api('/dock') || [];
        const tool = tools.find(t => t.id === id);
        if (!tool) return;
        showModal('编辑工具', `
            <div class="form-group"><label>名称</label><input class="form-input" id="editToolName" value="${tool.name}"></div>
            <div class="form-group"><label>URL</label><input class="form-input" id="editToolUrl" value="${tool.url}"></div>
            <div class="form-group"><label>图标URL</label><input class="form-input" id="editToolIcon" value="${tool.icon}"></div>
        `, async () => {
            await api('/dock/' + id, { method: 'PUT', body: JSON.stringify({
                name: document.getElementById('editToolName').value,
                url: document.getElementById('editToolUrl').value,
                icon: document.getElementById('editToolIcon').value
            })});
            toast('保存成功'); closeModal(); renderDock(document.getElementById('mainContent'));
        });
    }

    async function deleteTool(id) {
        if (!confirm('确定删除？')) return;
        await api('/dock/' + id, { method: 'DELETE' });
        toast('已删除'); renderDock(document.getElementById('mainContent'));
    }

    async function renderSettings(el) {
        const s = await api('/settings') || {};
        el.innerHTML = `
        <div class="card-header"><h2>站点设置</h2><div class="actions">
            <button class="btn btn-primary btn-sm" onclick="saveSettings()">保存</button>
        </div></div>
        <div class="grid-2">
            <div class="card">
                <h3 style="font-size:0.85rem;margin-bottom:1rem;color:rgba(255,255,255,0.7)">基本信息</h3>
                <div class="form-group"><label>站点标题</label><input class="form-input" id="setSiteTitle" value="${s.siteTitle || ''}"></div>
                <div class="form-group"><label>昵称</label><input class="form-input" id="setNickname" value="${s.nickname || ''}"></div>
                <div class="form-group"><label>个人介绍</label><input class="form-input" id="setBio" value="${s.bio || ''}" placeholder="展示在首页的个人介绍"></div>
            </div>
            <div class="card">
                <h3 style="font-size:0.85rem;margin-bottom:1rem;color:rgba(255,255,255,0.7)">显示设置</h3>
                <div class="form-group"><label>毛玻璃效果</label>
                    <select class="form-input" id="setGlass"><option value="true" ${s.glassEffect==='true'?'selected':''}>开启</option><option value="false" ${s.glassEffect==='false'?'selected':''}>关闭</option></select>
                </div>
                <div class="form-group"><label>显示底栏</label>
                    <select class="form-input" id="setDock"><option value="true" ${s.showDock==='true'?'selected':''}>显示</option><option value="false" ${s.showDock==='false'?'selected':''}>隐藏</option></select>
                </div>
            </div>
        </div>
        <div class="card" style="margin-top:1rem">
            <h3 style="font-size:0.85rem;margin-bottom:1rem;color:rgba(255,255,255,0.7)">播放源链接</h3>
            <div style="font-size:0.75rem;color:rgba(255,255,255,0.35);margin-bottom:0.8rem">点击歌曲跳转的平台地址</div>
            <div class="form-group"><label>网易云</label><input class="form-input" id="setPlatformNetease" value="${s.platformNetease || ''}" placeholder="https://music.163.com/..."></div>
            <div class="form-group"><label>QQ音乐</label><input class="form-input" id="setPlatformQQ" value="${s.platformQQ || ''}" placeholder="https://y.qq.com/..."></div>
            <div class="form-group"><label>Bilibili</label><input class="form-input" id="setPlatformBilibili" value="${s.platformBilibili || ''}" placeholder="https://www.bilibili.com/..."></div>
        </div>`;
    }

    async function saveSettings() {
        await api('/settings', { method: 'PUT', body: JSON.stringify({
            siteTitle: document.getElementById('setSiteTitle').value,
            nickname: document.getElementById('setNickname').value,
            bio: document.getElementById('setBio').value,
            glassEffect: document.getElementById('setGlass').value,
            showDock: document.getElementById('setDock').value,
            platformNetease: document.getElementById('setPlatformNetease').value,
            platformQQ: document.getElementById('setPlatformQQ').value,
            platformBilibili: document.getElementById('setPlatformBilibili').value
        })});
        toast('设置已保存');
    }

    async function renderProfile(el) {
        el.innerHTML = `
        <div class="card-header"><h2>个人资料</h2></div>
        <div class="card" style="max-width:480px">
            <div class="form-group"><label>用户名</label><input class="form-input" id="profUsername" value="${userInfo?.username || ''}"></div>
            <div class="form-group"><label>个人介绍</label><input class="form-input" id="profBio" value="${userInfo?.bio || ''}" placeholder="介绍一下自己"></div>
            <div class="form-group"><label>修改密码</label><input class="form-input" id="profOldPass" type="password" placeholder="原密码（不修改密码请留空）"></div>
            <div class="form-group"><input class="form-input" id="profNewPass" type="password" placeholder="新密码"></div>
            <button class="btn btn-primary" onclick="saveProfile()">保存</button>
        </div>`;
    }

    async function saveProfile() {
        const username = document.getElementById('profUsername').value.trim();
        const bio = document.getElementById('profBio').value.trim();
        const oldPass = document.getElementById('profOldPass').value;
        const newPass = document.getElementById('profNewPass').value;

        if (username) {
            const res = await api('/auth/me', { method: 'PUT', body: JSON.stringify({ username, bio }) });
            if (res?.success) { userInfo = res.user; toast('资料已更新'); }
        }

        if (oldPass && newPass) {
            const res = await api('/auth/change-password', { method: 'POST', body: JSON.stringify({ oldPassword: oldPass, newPassword: newPass }) });
            if (res?.success) toast('密码已修改');
            else toast(res?.error || '修改失败', 'error');
        }
    }

    let modalCallback = null;
    function showModal(title, body, onConfirm) {
        modalCallback = onConfirm;
        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        overlay.id = 'modalOverlay';
        overlay.innerHTML = `<div class="modal">
            <h3>${title}</h3>${body}
            <div class="modal-actions">
                <button class="btn btn-ghost" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="confirmModal()">确定</button>
            </div>
        </div>`;
        overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
        document.body.appendChild(overlay);
    }
    function closeModal() { document.getElementById('modalOverlay')?.remove(); modalCallback = null; }
    function confirmModal() { if (modalCallback) modalCallback(); }

    render();
    </script>
</body>
</html>
