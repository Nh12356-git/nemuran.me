<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nemuran.me 后台管理</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #0f0f1a; color: #e0e0e0; min-height: 100vh; }

        .login-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-box { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 2.5rem; width: 360px; backdrop-filter: blur(20px); }
        .login-box h2 { text-align: center; margin-bottom: 1.5rem; font-size: 1.2rem; color: rgba(255,255,255,0.9); }

        .layout { display: flex; min-height: 100vh; }
        .sidebar { width: 220px; background: rgba(18,18,32,0.95); border-right: 1px solid rgba(255,255,255,0.06); padding: 1.5rem 0; flex-shrink: 0; position: fixed; height: 100vh; overflow-y: auto; }
        .sidebar h3 { padding: 0 1.2rem; font-size: 0.9rem; color: rgba(138,180,248,0.8); margin-bottom: 1rem; }
        .sidebar a { display: flex; align-items: center; gap: 0.6rem; padding: 0.6rem 1.2rem; color: rgba(255,255,255,0.6); text-decoration: none; font-size: 0.85rem; transition: all 0.2s; }
        .sidebar a:hover, .sidebar a.active { background: rgba(138,180,248,0.1); color: rgba(255,255,255,0.9); }
        .sidebar a.active { border-right: 2px solid rgba(138,180,248,0.6); }
        .sidebar-footer { position: absolute; bottom: 0; width: 100%; padding: 1rem 1.2rem; border-top: 1px solid rgba(255,255,255,0.06); }

        .main { margin-left: 220px; flex: 1; padding: 2rem; }
        .main h2 { font-size: 1.1rem; font-weight: 500; margin-bottom: 1.5rem; color: rgba(255,255,255,0.9); }

        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-size: 0.78rem; color: rgba(255,255,255,0.5); margin-bottom: 0.3rem; }
        .form-input { width: 100%; padding: 0.6rem 0.8rem; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; color: #fff; font-size: 0.85rem; outline: none; transition: all 0.3s; }
        .form-input:focus { border-color: rgba(138,180,248,0.4); box-shadow: 0 0 0 3px rgba(138,180,248,0.08); }
        .form-input::placeholder { color: rgba(255,255,255,0.2); }

        .btn { padding: 0.55rem 1.2rem; border-radius: 10px; border: none; font-size: 0.82rem; cursor: pointer; transition: all 0.25s; font-weight: 500; }
        .btn-primary { background: linear-gradient(135deg, rgba(88,150,255,0.6), rgba(138,180,248,0.7)); color: #fff; }
        .btn-primary:hover { background: linear-gradient(135deg, rgba(88,150,255,0.8), rgba(138,180,248,0.9)); }
        .btn-danger { background: rgba(255,60,60,0.15); color: rgba(255,120,120,0.9); }
        .btn-danger:hover { background: rgba(255,60,60,0.25); }
        .btn-ghost { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.08); }
        .btn-ghost:hover { background: rgba(255,255,255,0.08); color: #fff; }
        .btn-sm { padding: 0.35rem 0.7rem; font-size: 0.75rem; }

        .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 1.2rem; margin-bottom: 1rem; }
        .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }

        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
        th { text-align: left; padding: 0.6rem 0.8rem; color: rgba(255,255,255,0.4); font-weight: 500; border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; }
        td { padding: 0.6rem 0.8rem; border-bottom: 1px solid rgba(255,255,255,0.04); }
        tr:hover td { background: rgba(255,255,255,0.02); }

        .actions { display: flex; gap: 0.4rem; }

        .toast { position: fixed; bottom: 2rem; right: 2rem; padding: 0.7rem 1.2rem; border-radius: 10px; font-size: 0.82rem; z-index: 999; animation: slideIn 0.3s ease; }
        .toast-success { background: rgba(60,180,80,0.9); color: #fff; }
        .toast-error { background: rgba(255,60,60,0.9); color: #fff; }
        @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .modal { background: rgba(18,18,32,0.95); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 1.5rem; width: 90%; max-width: 480px; }
        .modal h3 { font-size: 1rem; margin-bottom: 1rem; }
        .modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 1.2rem; }

        .empty { text-align: center; padding: 3rem; color: rgba(255,255,255,0.3); font-size: 0.85rem; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        @media (max-width: 768px) { .sidebar { display: none; } .main { margin-left: 0; } .grid-2 { grid-template-columns: 1fr; } }

        textarea.form-input { min-height: 120px; resize: vertical; font-family: monospace; font-size: 0.8rem; }
        .wallpaper-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 0.8rem; }
        .wallpaper-thumb { aspect-ratio: 16/10; border-radius: 10px; overflow: hidden; border: 2px solid rgba(255,255,255,0.06); cursor: pointer; position: relative; transition: all 0.25s; }
        .wallpaper-thumb:hover { border-color: rgba(138,180,248,0.4); }
        .wallpaper-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .wallpaper-thumb .wp-actions { position: absolute; top: 4px; right: 4px; display: flex; gap: 4px; opacity: 0; transition: opacity 0.2s; }
        .wallpaper-thumb:hover .wp-actions { opacity: 1; }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
    const API = window.location.origin + '/api';
    let token = localStorage.getItem('admin_token');
    let currentPage = 'songs';

    function api(path, opts = {}) {
        const headers = { 'Content-Type': 'application/json' };
        if (token) headers['Authorization'] = 'Bearer ' + token;
        return fetch(API + path, { ...opts, headers: { ...headers, ...opts.headers } })
            .then(async r => {
                if (r.status === 401) { token = null; localStorage.removeItem('admin_token'); render(); return null; }
                return r.json();
            });
    }

    function toast(msg, type = 'success') {
        const el = document.createElement('div');
        el.className = 'toast toast-' + type;
        el.textContent = msg;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 2500);
    }

    function render() {
        const app = document.getElementById('app');
        if (!token) { renderLogin(app); return; }
        renderLayout(app);
    }

    function renderLogin(app) {
        app.innerHTML = `
        <div class="login-page">
            <div class="login-box">
                <h2>nemuran.me 后台管理</h2>
                <div class="form-group"><label>用户名</label><input class="form-input" id="loginUser" value="admin"></div>
                <div class="form-group"><label>密码</label><input class="form-input" id="loginPass" type="password" placeholder="请输入密码"></div>
                <div style="margin-top:1rem"><button class="btn btn-primary" style="width:100%" onclick="doLogin()">登录</button></div>
            </div>
        </div>`;
        document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    }

    async function doLogin() {
        const username = document.getElementById('loginUser').value;
        const password = document.getElementById('loginPass').value;
        const res = await fetch(API + '/login', {
            method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ username, password })
        }).then(r => r.json());
        if (res.token) {
            token = res.token;
            localStorage.setItem('admin_token', token);
            render();
        } else {
            toast(res.error || '登录失败', 'error');
        }
    }

    function renderLayout(app) {
        const pages = [
            { id: 'songs', icon: '♫', label: '歌曲管理' },
            { id: 'wallpapers', icon: '🖼', label: '壁纸管理' },
            { id: 'dock', icon: '📌', label: '底栏工具' },
            { id: 'settings', icon: '⚙', label: '站点设置' },
        ];
        app.innerHTML = `
        <div class="layout">
            <div class="sidebar">
                <h3>nemuran.me</h3>
                ${pages.map(p => `<a href="#" class="${p.id === currentPage ? 'active' : ''}" onclick="navigate('${p.id}');return false;">${p.icon} ${p.label}</a>`).join('')}
                <div class="sidebar-footer">
                    <a href="/" target="_blank">🌐 查看网站</a>
                    <a href="#" onclick="logout();return false;">🚪 退出登录</a>
                </div>
            </div>
            <div class="main" id="mainContent"></div>
        </div>`;
        renderPage();
    }

    function navigate(page) { currentPage = page; renderLayout(document.getElementById('app')); }
    function logout() { token = null; localStorage.removeItem('admin_token'); render(); }

    async function renderPage() {
        const main = document.getElementById('mainContent');
        switch (currentPage) {
            case 'songs': return renderSongs(main);
            case 'wallpapers': return renderWallpapers(main);
            case 'dock': return renderDock(main);
            case 'settings': return renderSettings(main);
        }
    }

    async function renderSongs(el) {
        const songs = await api('/songs') || [];
        el.innerHTML = `
        <div class="card-header"><h2>歌曲管理</h2><div class="actions">
            <button class="btn btn-primary btn-sm" onclick="showAddSong()">+ 添加歌曲</button>
        </div></div>
        <div class="card"><div class="table-wrap"><table>
            <thead><tr><th>ID</th><th>歌名</th><th>歌手</th><th>文件夹</th><th>操作</th></tr></thead>
            <tbody>${songs.length ? songs.map(s => `
                <tr><td>#${s.id}</td><td>${s.title}</td><td>${s.artist}</td><td style="color:rgba(255,255,255,0.4);font-size:0.75rem">${s.folder}</td>
                <td class="actions">
                    <button class="btn btn-ghost btn-sm" onclick="editSong(${s.id})">编辑</button>
                    <button class="btn btn-danger btn-sm" onclick="deleteSong(${s.id},'${s.title.replace(/'/g,"\\'")}')">删除</button>
                </td></tr>`).join('') : '<tr><td colspan="5" class="empty">暂无歌曲</td></tr>'}
            </tbody></table></div></div>`;
    }

    async function showAddSong() {
        showModal('添加歌曲', `
            <div class="form-group"><label>歌曲文件夹名</label><input class="form-input" id="songFolder" placeholder="与 file/music/ 下的文件夹名一致"></div>
            <div class="form-group"><label>歌名（留空自动读取MP3标签）</label><input class="form-input" id="songTitle"></div>
            <div class="form-group"><label>歌手（留空自动读取MP3标签）</label><input class="form-input" id="songArtist"></div>
        `, async () => {
            const res = await api('/songs', { method: 'POST', body: JSON.stringify({
                folder: document.getElementById('songFolder').value,
                title: document.getElementById('songTitle').value,
                artist: document.getElementById('songArtist').value
            })});
            if (res?.success) { toast('添加成功'); closeModal(); renderSongs(document.getElementById('mainContent')); }
            else toast(res?.error || '添加失败', 'error');
        });
    }

    async function editSong(id) {
        const song = await api('/songs/' + id);
        if (!song) return;
        showModal('编辑歌曲', `
            <div class="form-group"><label>歌名</label><input class="form-input" id="editTitle" value="${song.title}"></div>
            <div class="form-group"><label>歌手</label><input class="form-input" id="editArtist" value="${song.artist}"></div>
        `, async () => {
            const res = await api('/songs/' + id, { method: 'PUT', body: JSON.stringify({
                title: document.getElementById('editTitle').value,
                artist: document.getElementById('editArtist').value
            })});
            if (res?.success) { toast('保存成功'); closeModal(); renderSongs(document.getElementById('mainContent')); }
        });
    }

    async function deleteSong(id, title) {
        if (!confirm(`确定删除「${title}」？`)) return;
        const res = await api('/songs/' + id + '?deleteFile=true', { method: 'DELETE' });
        if (res?.success) { toast('已删除'); renderSongs(document.getElementById('mainContent')); }
    }

    async function renderWallpapers(el) {
        const wallpapers = await api('/wallpapers') || [];
        el.innerHTML = `
        <div class="card-header"><h2>壁纸管理</h2><div class="actions">
            <button class="btn btn-primary btn-sm" onclick="uploadWallpaper()">+ 上传壁纸</button>
        </div></div>
        <div class="card"><div class="wallpaper-grid">
            ${wallpapers.length ? wallpapers.map(w => `
                <div class="wallpaper-thumb">
                    <img src="file/picture/${w.filename}" alt="${w.filename}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 160 100%22><rect fill=%22%23333%22 width=%22160%22 height=%22100%22/><text x=%2280%22 y=%2255%22 font-size=%2212%22 fill=%22%23666%22 text-anchor=%22middle%22>加载失败</text></svg>'">
                    <div class="wp-actions">
                        ${w.is_default ? '<span style="background:rgba(138,180,248,0.8);color:#fff;padding:2px 6px;border-radius:4px;font-size:0.65rem">默认</span>' : ''}
                        <button class="btn btn-danger btn-sm" onclick="deleteWallpaper(${w.id},'${w.filename}')">删除</button>
                    </div>
                </div>
            `).join('') : '<div class="empty">暂无壁纸</div>'}
        </div></div>`;
    }

    function uploadWallpaper() {
        const input = document.createElement('input');
        input.type = 'file'; input.accept = 'image/*';
        input.onchange = async () => {
            const file = input.files[0];
            if (!file) return;
            const fd = new FormData();
            fd.append('file', file);
            const res = await fetch(API + '/upload/wallpaper?type=wallpaper', {
                method: 'POST', headers: { 'Authorization': 'Bearer ' + token }, body: fd
            }).then(r => r.json());
            if (res.success) {
                await api('/wallpapers', { method: 'POST', body: JSON.stringify({ filename: res.filename }) });
                toast('上传成功'); renderWallpapers(document.getElementById('mainContent'));
            }
        };
        input.click();
    }

    async function deleteWallpaper(id, filename) {
        if (!confirm(`确定删除壁纸「${filename}」？`)) return;
        const res = await api('/wallpapers/' + id + '?deleteFile=true', { method: 'DELETE' });
        if (res?.success) { toast('已删除'); renderWallpapers(document.getElementById('mainContent')); }
    }

    async function renderDock(el) {
        const tools = await api('/dock') || [];
        el.innerHTML = `
        <div class="card-header"><h2>底栏工具</h2><div class="actions">
            <button class="btn btn-primary btn-sm" onclick="showAddTool()">+ 添加工具</button>
        </div></div>
        <div class="card"><div class="table-wrap"><table>
            <thead><tr><th>名称</th><th>URL</th><th>图标</th><th>操作</th></tr></thead>
            <tbody>${tools.length ? tools.map(t => `
                <tr><td>${t.name}</td><td style="color:rgba(255,255,255,0.4);font-size:0.75rem;max-width:200px;overflow:hidden;text-overflow:ellipsis">${t.url}</td>
                <td>${t.icon ? '<img src="'+t.icon+'" style="width:20px;height:20px;border-radius:4px">' : '-'}</td>
                <td class="actions">
                    <button class="btn btn-ghost btn-sm" onclick="editTool(${t.id})">编辑</button>
                    <button class="btn btn-danger btn-sm" onclick="deleteTool(${t.id})">删除</button>
                </td></tr>`).join('') : '<tr><td colspan="4" class="empty">暂无工具</td></tr>'}
            </tbody></table></div></div>`;
    }

    function showAddTool() {
        showModal('添加工具', `
            <div class="form-group"><label>工具名称</label><input class="form-input" id="toolName" maxlength="8"></div>
            <div class="form-group"><label>URL</label><input class="form-input" id="toolUrl" placeholder="https://example.com"></div>
            <div class="form-group"><label>图标URL（可选）</label><input class="form-input" id="toolIcon"></div>
        `, async () => {
            const res = await api('/dock', { method: 'POST', body: JSON.stringify({
                name: document.getElementById('toolName').value,
                url: document.getElementById('toolUrl').value,
                icon: document.getElementById('toolIcon').value
            })});
            if (res?.success) { toast('添加成功'); closeModal(); renderDock(document.getElementById('mainContent')); }
        });
    }

    async function editTool(id) {
        const tools = await api('/dock') || [];
        const tool = tools.find(t => t.id === id);
        if (!tool) return;
        showModal('编辑工具', `
            <div class="form-group"><label>名称</label><input class="form-input" id="editToolName" value="${tool.name}"></div>
            <div class="form-group"><label>URL</label><input class="form-input" id="editToolUrl" value="${tool.url}"></div>
            <div class="form-group"><label>图标URL</label><input class="form-input" id="editToolIcon" value="${tool.icon}"></div>
        `, async () => {
            await api('/dock/' + id, { method: 'PUT', body: JSON.stringify({
                name: document.getElementById('editToolName').value,
                url: document.getElementById('editToolUrl').value,
                icon: document.getElementById('editToolIcon').value
            })});
            toast('保存成功'); closeModal(); renderDock(document.getElementById('mainContent'));
        });
    }

    async function deleteTool(id) {
        if (!confirm('确定删除？')) return;
        await api('/dock/' + id, { method: 'DELETE' });
        toast('已删除'); renderDock(document.getElementById('mainContent'));
    }

    async function renderSettings(el) {
        const s = await api('/settings') || {};
        el.innerHTML = `
        <div class="card-header"><h2>站点设置</h2><div class="actions">
            <button class="btn btn-primary btn-sm" onclick="saveSettings()">保存</button>
        </div></div>
        <div class="grid-2">
            <div class="card">
                <h3 style="font-size:0.85rem;margin-bottom:1rem;color:rgba(255,255,255,0.7)">基本信息</h3>
                <div class="form-group"><label>站点标题</label><input class="form-input" id="setSiteTitle" value="${s.siteTitle || ''}"></div>
                <div class="form-group"><label>昵称</label><input class="form-input" id="setNickname" value="${s.nickname || ''}"></div>
            </div>
            <div class="card">
                <h3 style="font-size:0.85rem;margin-bottom:1rem;color:rgba(255,255,255,0.7)">显示设置</h3>
                <div class="form-group"><label>毛玻璃效果</label>
                    <select class="form-input" id="setGlass"><option value="true" ${s.glassEffect==='true'?'selected':''}>开启</option><option value="false" ${s.glassEffect==='false'?'selected':''}>关闭</option></select>
                </div>
                <div class="form-group"><label>显示底栏</label>
                    <select class="form-input" id="setDock"><option value="true" ${s.showDock==='true'?'selected':''}>显示</option><option value="false" ${s.showDock==='false'?'selected':''}>隐藏</option></select>
                </div>
            </div>
        </div>`;
    }

    async function saveSettings() {
        await api('/settings', { method: 'PUT', body: JSON.stringify({
            siteTitle: document.getElementById('setSiteTitle').value,
            nickname: document.getElementById('setNickname').value,
            glassEffect: document.getElementById('setGlass').value,
            showDock: document.getElementById('setDock').value
        })});
        toast('设置已保存');
    }

    let modalCallback = null;
    function showModal(title, body, onConfirm) {
        modalCallback = onConfirm;
        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        overlay.id = 'modalOverlay';
        overlay.innerHTML = `<div class="modal">
            <h3>${title}</h3>${body}
            <div class="modal-actions">
                <button class="btn btn-ghost" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="confirmModal()">确定</button>
            </div>
        </div>`;
        overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
        document.body.appendChild(overlay);
    }
    function closeModal() { document.getElementById('modalOverlay')?.remove(); modalCallback = null; }
    function confirmModal() { if (modalCallback) modalCallback(); }

    render();
    </script>
</body>
</html>
